# SoCal surf spot database.
#
# Coordinates and tide stations are approximate and meant for forecast
# fetching, not navigation. ideal_swell_deg is the swell direction window
# (degrees, meteorological "coming from") where the spot turns on.
# beach_orientation_deg is the direction the beach faces seaward
# (offshore wind blows from the opposite direction).
#
# tide_pref:    low | mid_low | mid | mid_high | high | any
# skill_floor:  any | intermediate | advanced
#
# We deliberately do NOT carry a numeric face_factor — translating
# Open-Meteo's deep-water Hs to actual face height at the spot depends on
# swell direction, period, tide, and bathymetry in ways no static multiplier
# captures. The `notes` field hints at the spot's character (canyon-amplified,
# sheltered bay, exposed beach break, etc.) and the recipe LLM does the
# spot-aware translation in prose.

regions:
  santa-barbara: Santa Barbara
  ventura:      Ventura
  la:           Los Angeles
  oc:           Orange County
  sd:           San Diego

# NOAA tide stations used across the dataset:
#   9411340  Santa Barbara
#   9410840  Santa Monica
#   9410660  Los Angeles
#   9410230  La Jolla
#   9410170  San Diego
#   9412110  Port San Luis

